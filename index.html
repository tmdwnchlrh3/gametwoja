<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c10">
<title>갬투자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
/* ── 기본 변수 ── */
:root{
  --bg:#0a0c10;--surf:#13161e;--card:#1a1e28;--card2:#1f2436;
  --bdr:rgba(255,255,255,0.06);--bdr2:rgba(255,255,255,0.1);
  --acc:#00d4a8;--acc-dim:rgba(0,212,168,0.12);
  --blue:#5b9cf6;--blue-dim:rgba(91,156,246,0.12);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.12);
  --gold:#f5c542;
  --txt:#eef0f8;--txt2:#8b90a8;--txt3:#555c78;
  --fnt:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif;
  --mono:'SF Mono','Courier New',monospace;
  --r:12px;--r-sm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:60px;
}
body.light{
  --bg:#f2f4fa;--surf:#ffffff;--card:#e8ecf5;--card2:#dde2ef;
  --bdr:rgba(0,0,0,0.07);--bdr2:rgba(0,0,0,0.12);
  --txt:#0d0f18;--txt2:#5a6080;--txt3:#9aa0b8;
}
body.blue{
  --bg:#060e1f;--surf:#0c1a35;--card:#112040;--card2:#162849;
  --bdr:rgba(91,156,246,0.1);--bdr2:rgba(91,156,246,0.2);
  --acc:#5b9cf6;--acc-dim:rgba(91,156,246,0.12);
  --txt:#dce8ff;--txt2:#6a82b0;
}

/* ── 리셋 ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--txt);font-family:var(--fnt);font-size:14px;line-height:1.5;transition:background .25s,color .25s}

/* ── 앱 껍데기 ── */
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ── 상단바 ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px;background:var(--surf);
  border-bottom:.5px solid var(--bdr);flex-shrink:0;
  position:relative;z-index:10;
}
.logo{display:flex;align-items:baseline;gap:6px}
.logo-text{font-size:18px;font-weight:800;color:var(--acc);letter-spacing:-0.5px}
.logo-ver{font-size:10px;color:var(--txt3);font-weight:400}
.topbar-right{display:flex;align-items:center;gap:10px}
.theme-wrap{display:flex;align-items:center;gap:5px}
.theme-label{font-size:10px;color:var(--txt3)}
.tbtn{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
.tbtn.on{border-color:var(--acc)}
.notif-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);font-size:16px;position:relative}
.notif-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--surf)}

/* ── 검색 ── */
.searchbar{
  margin:10px 14px 0;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:.5px solid var(--bdr);
  border-radius:10px;padding:9px 12px;
  transition:border-color .2s;
}
.searchbar:focus-within{border-color:var(--acc)}
.searchbar i{font-size:16px;color:var(--txt3);flex-shrink:0}
.searchbar input{background:none;border:none;outline:none;color:var(--txt);font-size:13px;width:100%;font-family:var(--fnt)}
.searchbar input::placeholder{color:var(--txt3)}

/* ── 탭바 (상단 서브탭) ── */
.subtabs{
  display:flex;background:var(--surf);
  border-bottom:.5px solid var(--bdr);
  margin-top:8px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;padding:0 8px;
}
.subtabs::-webkit-scrollbar{display:none}
.stab{
  padding:9px 12px;font-size:12px;font-weight:500;
  color:var(--txt3);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;
  display:flex;align-items:center;gap:5px;flex-shrink:0;
}
.stab i{font-size:14px}
.stab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ── 콘텐츠 ── */
.content{
  flex:1;overflow-y:auto;
  padding:12px 14px calc(var(--nav-h) + var(--safe-bottom) + 8px);
  scrollbar-width:thin;scrollbar-color:var(--card2) transparent;
  overscroll-behavior:contain;
}
.content::-webkit-scrollbar{width:2px}
.content::-webkit-scrollbar-thumb{background:var(--card2);border-radius:2px}

.panel{display:none}.panel.on{display:block}

/* ── 섹션 타이틀 ── */
.sec{font-size:10px;font-weight:700;letter-spacing:.9px;color:var(--txt3);text-transform:uppercase;margin:14px 0 8px}
.sec:first-child{margin-top:0}

/* ── 마켓 요약 배너 ── */
.market-banner{
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  border:.5px solid var(--bdr2);border-radius:var(--r);
  padding:14px;margin-bottom:14px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
}
.mb-item{text-align:center}
.mb-label{font-size:10px;color:var(--txt3);margin-bottom:3px}
.mb-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.mb-val.up{color:var(--red)}.mb-val.dn{color:var(--blue)}

/* ── 주식 카드 ── */
.scard{
  background:var(--card);border:.5px solid var(--bdr);
  border-radius:var(--r);padding:12px 14px;margin-bottom:8px;
  cursor:pointer;transition:border-color .15s,transform .1s;
  active-transform:scale(.99);
}
.scard:active{transform:scale(.99)}
.scard:hover{border-color:var(--bdr2)}
.scard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.scard-left{display:flex;align-items:center;gap:10px}
.scard-icon{width:36px;height:36px;border-radius:10px;background:var(--acc-dim);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--acc);flex-shrink:0}
.scard-icon.dn-icon{background:var(--blue-dim);color:var(--blue)}
.sname{font-size:14px;font-weight:600;color:var(--txt)}
.scode{font-size:11px;color:var(--txt3);margin-top:1px}
.scard-right{text-align:right}
.sprice{font-size:16px;font-weight:700;font-family:var(--mono)}
.sprice.up{color:var(--red)}.sprice.dn{color:var(--blue)}
.schg{font-size:11px;font-family:var(--mono);margin-top:2px}
.schg.up{color:var(--red)}.schg.dn{color:var(--blue)}
.scard-star{background:none;border:none;cursor:pointer;padding:4px;color:var(--txt3);font-size:18px;transition:color .15s;margin-left:6px;line-height:1}
.scard-star.on{color:var(--gold)}
.scard-bot{display:flex;align-items:center;gap:6px}
.schip{font-size:10px;color:var(--txt3);background:var(--card2);border-radius:5px;padding:2px 7px}
.spark{height:36px;margin-top:2px;flex:1}
canvas.sp{width:100%;height:36px;display:block}

/* ── 즐겨찾기 빈 상태 ── */
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.4}
.empty p{font-size:13px;line-height:1.6}

/* ── 뉴스 ── */
.ncard{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.ncard:active{transform:scale(.99)}
.ncard-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.nsrc{font-size:10px;color:var(--acc);font-weight:700}
.nbadge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.nb공시{background:var(--blue-dim);color:var(--blue)}
.nb뉴스{background:var(--acc-dim);color:var(--acc)}
.nb실적{background:var(--red-dim);color:var(--red)}
.ntit{font-size:13px;color:var(--txt);line-height:1.5;margin-bottom:5px}
.ntime{font-size:11px;color:var(--txt3)}

/* ── 공시 아코디언 ── */
.disc-stock-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none;padding-bottom:2px}
.disc-stock-tabs::-webkit-scrollbar{display:none}
.dstab{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:.5px solid var(--bdr);background:var(--card);color:var(--txt2);transition:all .15s}
.dstab.on{background:var(--acc);color:#000;border-color:var(--acc)}
.dcard{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.dcard-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;transition:background .15s}
.dcard-hd:active{background:var(--card2)}
.dcard-lbl{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--txt)}
.dcard-lbl i{font-size:15px;color:var(--acc)}
.dcard-arr{color:var(--txt3);font-size:14px;transition:transform .2s}
.dcard-arr.open{transform:rotate(180deg)}
.dcard-body{display:none;padding:0 14px 12px;border-top:.5px solid var(--bdr)}
.dcard-body.open{display:block}
.drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--bdr);font-size:12px}
.drow:last-child{border-bottom:none}
.dkey{color:var(--txt2)}.dval{font-weight:600;font-family:var(--mono);font-size:12px}
.dval.pos{color:var(--red)}.dval.neg{color:var(--blue)}.dval.warn{color:var(--gold)}

/* ── 목표가 ── */
.tcard{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px}
.tcard-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tcard-name{font-size:14px;font-weight:700}
.tcard-avg{font-size:11px;color:var(--red);font-weight:600;text-align:right}
.tcard-avg span{color:var(--txt3);font-weight:400}
.tbar-bg{background:var(--card2);border-radius:3px;height:5px;overflow:hidden;margin-top:4px}
.tbar-fill{background:linear-gradient(90deg,var(--acc),var(--blue));height:5px;border-radius:3px;transition:width .6s}
.afirm{font-size:11px;color:var(--txt2)}
.aval{font-size:13px;font-weight:700;font-family:var(--mono)}

/* ── 투자포인트 ── */
.sector-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.sector-tabs::-webkit-scrollbar{display:none}
.sectab{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:.5px solid var(--bdr);background:var(--card);color:var(--txt2);transition:all .15s}
.sectab.on{background:var(--acc);color:#000;border-color:var(--acc)}
.ai-card{background:linear-gradient(135deg,rgba(0,212,168,.07),rgba(91,156,246,.05));border:.5px solid rgba(0,212,168,.2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ai-badge{font-size:9px;font-weight:700;color:var(--acc);letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.ai-badge::before{content:'';width:5px;height:5px;background:var(--acc);border-radius:50%;display:inline-block}
.ai-text{font-size:13px;color:var(--txt);line-height:1.65}
.inv-card{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:8px}
.inv-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--txt)}
.inv-title i{color:var(--acc);font-size:16px}
.inv-list{list-style:none}
.inv-list li{font-size:12px;color:var(--txt2);line-height:1.6;padding:5px 0 5px 16px;position:relative;border-bottom:.5px solid var(--bdr)}
.inv-list li:last-child{border-bottom:none}
.inv-list li::before{content:'▸';position:absolute;left:0;color:var(--acc);font-size:10px;top:6px}

/* ── 포트폴리오 ── */
.port-hero{background:linear-gradient(135deg,var(--card),var(--card2));border:.5px solid var(--bdr2);border-radius:var(--r);padding:16px;margin-bottom:10px}
.port-total-label{font-size:11px;color:var(--txt3);margin-bottom:4px}
.port-total{font-size:28px;font-weight:800;font-family:var(--mono);color:var(--txt);margin-bottom:10px}
.port-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pstat{text-align:center}
.pstat-l{font-size:10px;color:var(--txt3);margin-bottom:2px}
.pstat-v{font-size:14px;font-weight:700;font-family:var(--mono)}
.pstat-v.pos{color:var(--red)}.pstat-v.neg{color:var(--blue)}
.hrow{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.hrow:active{transform:scale(.99)}
.hn{font-size:13px;font-weight:600}.hq{font-size:11px;color:var(--txt3);margin-top:2px}
.hr{text-align:right}
.hv{font-size:13px;font-weight:700;font-family:var(--mono)}
.hp{font-size:11px;font-family:var(--mono);margin-top:2px}
.hp.pos{color:var(--red)}.hp.neg{color:var(--blue)}

/* ── 프로젝트 ── */
.srv-banner{border-radius:var(--r);padding:12px 14px;margin-bottom:12px;border:.5px solid}
.srv-banner.ok{background:rgba(0,212,168,.06);border-color:rgba(0,212,168,.2)}
.srv-banner.err{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.2)}
.srv-banner.chk{background:var(--card);border-color:var(--bdr)}
.srv-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:12px;font-weight:500}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.ok{background:var(--acc)}.sdot.err{background:var(--red)}.sdot.spin{background:var(--gold);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.url-row{display:flex;gap:8px;margin-top:8px}
.url-inp{flex:1;background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:12px;font-family:var(--mono);outline:none;min-width:0}
.url-inp:focus{border-color:var(--acc)}
.url-save{padding:9px 14px;background:var(--acc);border:none;border-radius:8px;color:#000;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--fnt);flex-shrink:0}
.proj-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.pms{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r-sm);padding:10px 6px;text-align:center}
.pms-n{font-size:18px;font-weight:800;font-family:var(--mono)}
.pms-l{font-size:9px;color:var(--txt3);margin-top:2px}
.nc{color:var(--acc)}.np{color:var(--gold)}.nt{color:var(--red)}
.filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fchip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:.5px solid var(--bdr);background:var(--card);color:var(--txt2);transition:all .15s;flex-shrink:0}
.fchip.on{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.add-task-btn{width:100%;padding:12px;background:var(--acc-dim);border:.5px solid rgba(0,212,168,.25);border-radius:var(--r);color:var(--acc);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;font-family:var(--fnt);transition:background .15s}
.add-task-btn:active{background:rgba(0,212,168,.2)}
.add-form{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:12px;display:none}
.add-form.open{display:block}
.flbl{font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:600}
.finp{width:100%;background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:13px;font-family:var(--fnt);outline:none;margin-bottom:10px;transition:border-color .15s}
.finp:focus{border-color:var(--acc)}
.fsel{width:100%;background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:13px;font-family:var(--fnt);outline:none;margin-bottom:10px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-btns{display:flex;gap:8px;margin-top:4px}
.f-ok{flex:1;padding:11px;background:var(--acc);border:none;border-radius:8px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fnt)}
.f-no{padding:11px 16px;background:none;border:.5px solid var(--bdr);border-radius:8px;color:var(--txt2);font-size:13px;cursor:pointer;font-family:var(--fnt)}
.trow{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.trow:active{transform:scale(.99)}
.trow-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.trow-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;color:var(--txt)}
.trow-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.tbadge{font-size:9px;padding:3px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
.st할일{background:var(--red-dim);color:var(--red)}
.st진행중{background:rgba(245,197,66,.12);color:var(--gold)}
.st완료{background:var(--acc-dim);color:var(--acc)}
.st보류{background:rgba(139,144,168,.1);color:var(--txt3)}
.cat백엔드{background:rgba(149,97,226,.12);color:#9561e2}
.cat프론트엔드{background:var(--blue-dim);color:var(--blue)}
.cat디자인{background:rgba(236,72,153,.12);color:#ec4899}
.cat데이터{background:rgba(249,115,22,.12);color:#f97316}
.cat배포{background:var(--acc-dim);color:var(--acc)}
.cat기획{background:rgba(139,144,168,.1);color:var(--txt3)}
.p긴급{background:var(--red-dim);color:var(--red)}
.p높음{background:rgba(249,115,22,.12);color:#f97316}
.p보통{background:var(--blue-dim);color:var(--blue)}
.p낮음{background:rgba(139,144,168,.1);color:var(--txt3)}
.trow-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt3)}
.trow-memo{font-size:12px;color:var(--txt2);margin-bottom:6px;line-height:1.45}

/* ── 하단 내비 ── */
.botnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  display:flex;background:var(--surf);
  border-top:.5px solid var(--bdr);
  padding-bottom:var(--safe-bottom);
  z-index:100;height:calc(var(--nav-h) + var(--safe-bottom));
}
.navi{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 4px 6px;cursor:pointer;
  color:var(--txt3);font-size:9px;font-weight:500;gap:4px;
  transition:color .15s;position:relative;
}
.navi i{font-size:22px;transition:transform .15s}
.navi.on{color:var(--acc)}
.navi.on i{transform:scale(1.05)}
.navi-dot{position:absolute;top:8px;right:calc(50% - 14px);width:5px;height:5px;background:var(--red);border-radius:50%;border:1.5px solid var(--surf)}

/* ── 라이브 인디케이터 ── */
.live-pill{display:inline-flex;align-items:center;gap:4px;background:var(--red-dim);border-radius:20px;padding:3px 8px;font-size:10px;color:var(--red);font-weight:600;margin-bottom:10px}
.ldot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:blink 1.5s infinite}
</style>
</head>
<body>
<div id="app">
  <!-- 상단바 -->
  <div class="topbar">
    <div class="logo">
      <span class="logo-text">갬투자</span>
      <span class="logo-ver">v2.0</span>
    </div>
    <div class="topbar-right">
      <div class="theme-wrap">
        <div class="tbtn on"  style="background:#0a0c10;border-color:var(--acc)" onclick="setTheme('dark',this)" title="다크"></div>
        <div class="tbtn" style="background:#f2f4fa;border:.5px solid #ccc" onclick="setTheme('light',this)" title="라이트"></div>
        <div class="tbtn" style="background:#060e1f;border:.5px solid #5b9cf6" onclick="setTheme('blue',this)" title="블루"></div>
      </div>
      <div class="notif-btn"><i class="ti ti-bell"></i><span class="notif-dot"></span></div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="searchbar">
    <i class="ti ti-search"></i>
    <input type="text" placeholder="종목명 또는 코드 검색..." id="srch" oninput="doSearch(this.value)">
  </div>

  <!-- 서브탭 (화면별로 다르게 표시) -->
  <div class="subtabs" id="subtabs" style="display:none"></div>

  <!-- 콘텐츠 -->
  <div class="content">

    <!-- 시세 -->
    <div class="panel on" id="panel-시세">
      <div class="live-pill"><span class="ldot"></span>실시간</div>
      <div class="market-banner" id="mktBanner"></div>
      <div class="sec">국내 주식</div>
      <div id="stockList"></div>
    </div>

    <!-- 즐겨찾기 -->
    <div class="panel" id="panel-관심">
      <div class="sec">관심 종목</div>
      <div id="favList"></div>
    </div>

    <!-- 공시 -->
    <div class="panel" id="panel-공시">
      <div class="disc-stock-tabs" id="discTabs"></div>
      <div id="discContent"></div>
    </div>

    <!-- 뉴스 -->
    <div class="panel" id="panel-뉴스">
      <div class="sec">최신 뉴스 & 공시</div>
      <div id="newsFeed"></div>
    </div>

    <!-- 포트폴리오 -->
    <div class="panel" id="panel-포트">
      <div class="port-hero" id="portHero"></div>
      <div class="sec">보유 종목</div>
      <div id="holdingList"></div>
    </div>

    <!-- 더보기 (목표가/투자포인트/프로젝트) -->
    <div class="panel" id="panel-더보기">
      <div class="subtabs" id="moreTabs" style="display:flex;margin:0 -14px 12px;padding:0 8px;border-bottom:.5px solid var(--bdr)">
        <div class="stab on" onclick="switchMore('목표가',this)"><i class="ti ti-target"></i>목표가</div>
        <div class="stab" onclick="switchMore('투자포인트',this)"><i class="ti ti-bulb"></i>투자포인트</div>
        <div class="stab" onclick="switchMore('프로젝트',this)"><i class="ti ti-list-check"></i>프로젝트</div>
      </div>
      <div id="more-목표가" class="morepanel on"></div>
      <div id="more-투자포인트" class="morepanel"></div>
      <div id="more-프로젝트" class="morepanel"></div>
    </div>

  </div>

  <!-- 하단 내비 -->
  <div class="botnav">
    <div class="navi on" onclick="switchNav('시세',this)"><i class="ti ti-chart-line"></i>시세</div>
    <div class="navi" onclick="switchNav('관심',this)"><i class="ti ti-star"></i>관심</div>
    <div class="navi" onclick="switchNav('공시',this)"><i class="ti ti-file-text"></i>공시</div>
    <div class="navi" onclick="switchNav('뉴스',this)"><i class="ti ti-news"></i>뉴스</div>
    <div class="navi" onclick="switchNav('포트',this)"><i class="ti ti-briefcase"></i>포트</div>
    <div class="navi" onclick="switchNav('더보기',this)"><i class="ti ti-dots"></i>더보기</div>
  </div>
</div>

let favs=new Set(['005930','000660']),activeDisc='삼성전자',activeSector='증권사';
let allTasks=[],taskFilter='전체',serverOk=false;
let SERVER_URL=localStorage.getItem('gam_srv')||'';

// ── 테마 ──
function setTheme(t,btn){
  document.body.className=t==='dark'?'':t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  localStorage.setItem('gam_theme',t);
}
const savedTheme=localStorage.getItem('gam_theme');
if(savedTheme&&savedTheme!=='dark'){
  document.body.className=savedTheme;
  const btns=document.querySelectorAll('.tbtn');
  if(savedTheme==='light')btns[1].classList.add('on');
  if(savedTheme==='blue')btns[2].classList.add('on');
  if(savedTheme==='dark')btns[0].classList.add('on');
}

// ── 네비 ──
function switchNav(name,el){
  document.querySelectorAll('.navi').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('panel-'+name).classList.add('on');
  if(name==='관심')renderFavs();
  if(name==='공시')renderDisc();
  if(name==='뉴스')renderNews();
  if(name==='포트')renderPortfolio();
  if(name==='더보기'){renderTargets();renderInvest();renderProject();}
}
function switchMore(name,el){
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.morepanel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('more-'+name).classList.add('on');
}
document.querySelectorAll('.morepanel').forEach(p=>{
  if(!p.classList.contains('on'))p.style.display='none';
});
// CSS로 처리
const moreStyle=document.createElement('style');
moreStyle.textContent='.morepanel{display:none}.morepanel.on{display:block}';
document.head.appendChild(moreStyle);

// ── 마켓 배너 ──
function renderMarketBanner(){
  const kospi=stocks.filter(s=>['005930','000660','015760'].includes(s.code));
  const avgChg=(kospi.reduce((a,s)=>a+s.change,0)/kospi.length).toFixed(2);
  const up=avgChg>=0;
  document.getElementById('mktBanner').innerHTML=`
    <div class="mb-item"><div class="mb-label">KOSPI</div><div class="mb-val ${up?'up':'dn'}">${up?'+':''}${avgChg}%</div></div>
    <div class="mb-item"><div class="mb-label">KOSDAQ</div><div class="mb-val up">+0.84%</div></div>
    <div class="mb-item"><div class="mb-label">USD/KRW</div><div class="mb-val dn">1,384</div></div>
  `;
}

// ── 스파크라인 ──
function spark(id,up){
  const c=document.getElementById(id);if(!c)return;
  const pts=Array.from({length:20},(_,i)=>Math.random()*20+(up?i*1.5:40-i*1.2));
  new Chart(c,{type:'line',data:{labels:pts.map((_,i)=>i),datasets:[{data:pts,borderColor:up?'#ff6b6b':'#5b9cf6',borderWidth:1.5,fill:true,backgroundColor:up?'rgba(255,107,107,0.06)':'rgba(91,156,246,0.06)',pointRadius:0,tension:.4}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:500}}});
}

// ── 주식 카드 ──
function mkCard(s,container){
  const up=s.change>=0;
  const init=s.name.charAt(0);
  const d=document.createElement('div');d.className='scard';
  d.innerHTML=`
    <div class="scard-top">
      <div class="scard-left">
        <div class="scard-icon ${up?'':'dn-icon'}">${init}</div>
        <div><div class="sname">${s.name}</div><div class="scode">${s.code} · ${s.sector}</div></div>
      </div>
      <div style="display:flex;align-items:flex-start">
        <div class="scard-right">
          <div class="sprice ${up?'up':'dn'}">${s.price.toLocaleString()}</div>
          <div class="schg ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(s.change).toFixed(2)}%</div>
        </div>
        <button class="scard-star ${favs.has(s.code)?'on':''}" onclick="event.stopPropagation();toggleFav('${s.code}',this)" aria-label="즐겨찾기">
          <i class="ti ${favs.has(s.code)?'ti-star-filled':'ti-star'}"></i>
        </button>
      </div>
    </div>
    <div class="scard-bot">
      <span class="schip">거래량 ${s.vol}</span>
      <span class="schip">시총 ${s.cap}</span>
      <div class="spark"><canvas id="sp_${s.code}" width="120" height="36" class="sp"></canvas></div>
    </div>
  `;
  container.appendChild(d);
  setTimeout(()=>spark('sp_'+s.code,up),60);
}

function renderStocks(list){
  const c=document.getElementById('stockList');c.innerHTML='';
  (list||stocks).forEach(s=>mkCard(s,c));
}
function renderFavs(){
  const c=document.getElementById('favList');c.innerHTML='';
  const fs=stocks.filter(s=>favs.has(s.code));
  if(!fs.length){c.innerHTML='<div class="empty"><i class="ti ti-star"></i><p>즐겨찾기한 종목이 없어요<br>종목 카드의 ☆를 눌러 추가하세요</p></div>';return;}
  fs.forEach(s=>mkCard(s,c));
}
function toggleFav(code,btn){
  favs.has(code)?favs.delete(code):favs.add(code);
  btn.classList.toggle('on',favs.has(code));
  btn.querySelector('i').className='ti '+(favs.has(code)?'ti-star-filled':'ti-star');
  if(document.getElementById('panel-관심').classList.contains('on'))renderFavs();
}

// ── 검색 ──
function doSearch(v){
  if(!v){renderStocks();return;}
  renderStocks(stocks.filter(s=>s.name.includes(v)||s.code.includes(v)||s.sector.includes(v)));
}

// ── 공시 ──
function renderDisc(){
  const t=document.getElementById('discTabs');t.innerHTML='';
  Object.keys(disclosures).forEach(n=>{
    const ch=document.createElement('div');ch.className='dstab'+(n===activeDisc?' on':'');
    ch.textContent=n;ch.onclick=()=>{activeDisc=n;renderDisc()};t.appendChild(ch);
  });
  const c=document.getElementById('discContent');c.innerHTML='';
  Object.entries(disclosures[activeDisc]||{}).forEach(([k,rows])=>{
    const d=document.createElement('div');d.className='dcard';
    d.innerHTML=`<div class="dcard-hd" onclick="tglDisc(this)"><div class="dcard-lbl"><i class="ti ${discIcons[k]||'ti-file'}"></i>${k.replace('_','/')}</div><i class="ti ti-chevron-down dcard-arr"></i></div><div class="dcard-body">${rows.map(([a,b,cl])=>`<div class="drow"><span class="dkey">${a}</span><span class="dval ${cl}">${b}</span></div>`).join('')}</div>`;
    c.appendChild(d);
  });
}
function tglDisc(h){h.nextElementSibling.classList.toggle('open');h.querySelector('.dcard-arr').classList.toggle('open');}

// ── 목표가 ──
function renderTargets(){
  const c=document.getElementById('more-목표가');c.innerHTML='<div class="sec">애널리스트 목표가</div>';
  analysts.forEach(a=>{
    const avg=Math.round(a.targets.reduce((s,t)=>s+t.tp,0)/a.targets.length);
    const mx=Math.max(...a.targets.map(t=>t.tp));
    const up=((avg-a.price)/a.price*100).toFixed(1);
    const d=document.createElement('div');d.className='tcard';
    d.innerHTML=`<div class="tcard-hd"><span class="tcard-name">${a.stock}</span><div class="tcard-avg">평균 ${avg.toLocaleString()}원<br><span>현재가 대비 +${up}%</span></div></div>${a.targets.map(t=>{const pct=Math.round((t.tp-a.price)/a.price*100),bw=Math.round(t.tp/mx*100);return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="afirm">${t.firm}</span><span class="aval">${t.tp.toLocaleString()} <span style="font-size:10px;color:var(--red)">+${pct}%</span></span></div><div class="tbar-bg"><div class="tbar-fill" style="width:${bw}%"></div></div></div>`;}).join('')}`;
    c.appendChild(d);
  });
}

// ── 뉴스 ──
function renderNews(){
  const c=document.getElementById('newsFeed');c.innerHTML='';
  news.forEach(n=>{
    const d=document.createElement('div');d.className='ncard';
    d.innerHTML=`<div class="ncard-top"><span class="nsrc">${n.src}</span><span class="nbadge nb${n.badge}">${n.badge}</span></div><div class="ntit">${n.title}</div><div class="ntime">${n.time}</div>`;
    c.appendChild(d);
  });
}

// ── 투자포인트 ──
function renderInvest(){
  const c=document.getElementById('more-투자포인트');
  c.innerHTML=`<div class="sector-tabs" id="secTabs"></div><div id="secContent"></div>`;
  const t=document.getElementById('secTabs');
  Object.keys(sectors).forEach(s=>{
    const ch=document.createElement('div');ch.className='sectab'+(s===activeSector?' on':'');
    ch.textContent=s;ch.onclick=()=>{activeSector=s;renderSector()};t.appendChild(ch);
  });
  renderSector();
}
function renderSector(){
  document.querySelectorAll('.sectab').forEach(t=>t.classList.toggle('on',t.textContent===activeSector));
  const sec=sectors[activeSector];
  document.getElementById('secContent').innerHTML=`
    <div class="ai-card"><div class="ai-badge">AI 요약</div><div class="ai-text">${sec.points[0]}</div></div>
    <div class="inv-card"><div class="inv-title"><i class="ti ${sec.icon}"></i>${activeSector} 핵심 투자 포인트</div><ul class="inv-list">${sec.points.map(p=>`<li>${p}</li>`).join('')}</ul></div>
  `;
}

// ── 포트폴리오 ──
function renderPortfolio(){
  const ti=portfolio.reduce((s,h)=>s+h.qty*h.avg,0);
  const tc=portfolio.reduce((s,h)=>s+h.qty*h.curr,0);
  const pl=tc-ti,pp=((pl/ti)*100).toFixed(2);
  document.getElementById('portHero').innerHTML=`
    <div class="port-total-label">총 평가금액</div>
    <div class="port-total">${tc.toLocaleString()}원</div>
    <div class="port-stats">
      <div class="pstat"><div class="pstat-l">평가손익</div><div class="pstat-v ${pl>=0?'pos':'neg'}">${pl>=0?'+':''}${(pl/10000).toFixed(0)}만</div></div>
      <div class="pstat"><div class="pstat-l">수익률</div><div class="pstat-v ${pl>=0?'pos':'neg'}">${pl>=0?'+':''}${pp}%</div></div>
      <div class="pstat"><div class="pstat-l">투자원금</div><div class="pstat-v">${(ti/10000).toFixed(0)}만</div></div>
    </div>
  `;
  const hl=document.getElementById('holdingList');hl.innerHTML='';
  portfolio.forEach(h=>{
    const pl=(h.curr-h.avg)*h.qty,pp=(((h.curr-h.avg)/h.avg)*100).toFixed(2);
    const d=document.createElement('div');d.className='hrow';
    d.innerHTML=`<div><div class="hn">${h.name}</div><div class="hq">${h.qty}주 · 평단 ${h.avg.toLocaleString()}원</div></div><div class="hr"><div class="hv">${(h.curr*h.qty).toLocaleString()}</div><div class="hp ${pl>=0?'pos':'neg'}">${pl>=0?'+':''}${(pl/10000).toFixed(1)}만 (${pl>=0?'+':''}${pp}%)</div></div>`;
    hl.appendChild(d);
  });
}

// ── 프로젝트 ──
async function checkServer(){
  const c=document.getElementById('more-프로젝트');
  if(!SERVER_URL){showBanner(c,'nourl');renderDemoTasks();return;}
  showBanner(c,'chk');
  try{
    const r=await fetch(SERVER_URL+'/api/ping',{signal:AbortSignal.timeout(5000)});
    if(r.ok){serverOk=true;const j=await r.json();showBanner(c,'ok',j.env?.notion||'');loadTasks();return;}
  }catch{}
  serverOk=false;showBanner(c,'err');renderDemoTasks();
}
function showBanner(container,state,detail=''){
  let banner=container.querySelector('.srv-banner');
  if(!banner){banner=document.createElement('div');container.insertBefore(banner,container.firstChild);}
  banner.className='srv-banner '+state;
  if(state==='ok'){
    banner.innerHTML=`<div class="srv-row"><span class="sdot ok"></span><span>Render 서버 연결됨 ${detail}</span></div>`;
  }else if(state==='err'){
    banner.innerHTML=`<div class="srv-row"><span class="sdot err"></span><span>서버 연결 실패 — URL 확인 필요</span></div><div class="url-row"><input class="url-inp" id="srvUrl" placeholder="https://gametwoja.onrender.com" value="${SERVER_URL}"><button class="url-save" onclick="saveUrl()">저장</button></div>`;
  }else if(state==='nourl'){
    banner.innerHTML=`<div class="srv-row"><span class="sdot err"></span><span>Render 서버 URL을 입력하세요</span></div><div class="url-row"><input class="url-inp" id="srvUrl" placeholder="https://gametwoja.onrender.com" value="${SERVER_URL}"><button class="url-save" onclick="saveUrl()">저장</button></div>`;
  }else{
    banner.innerHTML=`<div class="srv-row"><span class="sdot spin"></span><span>서버 연결 확인 중...</span></div>`;
  }
}
function saveUrl(){
  const v=(document.getElementById('srvUrl')?.value||'').trim().replace(/\/$/,'');
  if(!v.startsWith('http')){alert('https://로 시작하는 URL을 입력하세요');return;}
  localStorage.setItem('gam_srv',v);SERVER_URL=v;
  renderProject();
}
async function loadTasks(){
  try{const r=await fetch(SERVER_URL+'/api/tasks');const j=await r.json();allTasks=j.tasks||[];applyFilter();}
  catch{renderDemoTasks();}
}
function renderDemoTasks(){
  allTasks=[
    {id:'d1',작업명:'갬투자 앱 UI/UX v2.0 개선',상태:'완료',우선순위:'높음',카테고리:'디자인',마감일:'2026-06-22',메모:'모바일 최적화 완성!',완료여부:true},
    {id:'d2',작업명:'Render 클라우드 서버 배포',상태:'완료',우선순위:'긴급',카테고리:'배포',마감일:'2026-06-22',메모:'gametwoja.onrender.com',완료여부:true},
    {id:'d3',작업명:'실시간 시세 API 연동',상태:'할 일',우선순위:'긴급',카테고리:'백엔드',마감일:'2026-07-05',메모:'KIS API 토큰 발급 필요'},
    {id:'d4',작업명:'DART 전자공시 API 연동',상태:'할 일',우선순위:'높음',카테고리:'백엔드',마감일:'2026-07-10',메모:'opendart.fss.or.kr 무료'},
    {id:'d5',작업명:'코인 시세 (업비트 WebSocket)',상태:'할 일',우선순위:'보통',카테고리:'백엔드',마감일:'2026-07-15',메모:'무료 공개 API'},
    {id:'d6',작업명:'포트폴리오 영구 저장',상태:'할 일',우선순위:'낮음',카테고리:'데이터',마감일:'2026-07-20',메모:'Notion DB 또는 로컬파일'},
  ];
  applyFilter();
}
function applyFilter(){
  const f=taskFilter==='전체'?allTasks:allTasks.filter(t=>t.상태===taskFilter);
  renderProjStats();renderTaskList(f);
}
function renderProjStats(){
  const cnt={'완료':0,'진행 중':0,'할 일':0};
  allTasks.forEach(t=>{if(cnt[t.상태]!==undefined)cnt[t.상태]++;});
  document.getElementById('projStats').innerHTML=`
    <div class="pms"><div class="pms-n nc">${cnt['완료']}</div><div class="pms-l">완료</div></div>
    <div class="pms"><div class="pms-n np">${cnt['진행 중']}</div><div class="pms-l">진행중</div></div>
    <div class="pms"><div class="pms-n nt">${cnt['할 일']}</div><div class="pms-l">할 일</div></div>
    <div class="pms"><div class="pms-n">${allTasks.length}</div><div class="pms-l">전체</div></div>
  `;
}
function filterTask(f,el){
  taskFilter=f;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');applyFilter();
}
function renderTaskList(tasks){
  const c=document.getElementById('taskList');c.innerHTML='';
  if(!tasks.length){c.innerHTML='<div class="empty"><i class="ti ti-check"></i><p>해당 상태의 작업이 없어요</p></div>';return;}
  tasks.forEach(t=>{
    const d=document.createElement('div');d.className='trow';
    const dl=t.마감일?Math.ceil((new Date(t.마감일)-new Date())/86400000):'';
    const dc=dl!==''&&dl<0?'color:var(--red)':dl<=3?'color:var(--gold)':'';
    d.innerHTML=`
      <div class="trow-top">
        <div class="trow-name">${t.완료여부?`<s style="opacity:.4">${t.작업명}</s>`:t.작업명}</div>
        <div class="trow-tags">
          <span class="tbadge st${t.상태.replace(' ','')}">${t.상태}</span>
          <span class="tbadge cat${t.카테고리}">${t.카테고리}</span>
        </div>
      </div>
      ${t.메모?`<div class="trow-memo">${t.메모}</div>`:''}
      <div class="trow-meta">
        <span class="tbadge p${t.우선순위}">${t.우선순위}</span>
        ${t.마감일?`<i class="ti ti-calendar" style="font-size:12px"></i><span style="${dc}">${t.마감일}${dl!==''?` · ${dl<0?Math.abs(dl)+'일 초과':dl===0?'오늘':dl+'일 남음'}`:''}</span>`:''}
      </div>
    `;
    if(!t.id.startsWith('d'))d.onclick=()=>cycleStatus(t);
    c.appendChild(d);
  });
}
async function cycleStatus(task){
  const order=['할 일','진행 중','완료','보류'];
  task.상태=order[(order.indexOf(task.상태)+1)%order.length];
  task.완료여부=task.상태==='완료';
  if(serverOk){try{await fetch(SERVER_URL+'/api/tasks/'+task.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({상태:task.상태,완료여부:task.완료여부})});}catch{}}
  applyFilter();
}
function toggleAddForm(){const f=document.getElementById('addForm');f.classList.toggle('open');if(f.classList.contains('open'))document.getElementById('fn').focus();}
async function submitTask(){
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('작업명을 입력하세요');return;}
  const t={id:'local-'+Date.now(),작업명:name,상태:'할 일',우선순위:document.getElementById('fp').value,카테고리:document.getElementById('fc').value,마감일:document.getElementById('fd').value,메모:document.getElementById('fm').value,완료여부:false};
  if(serverOk){try{const r=await fetch(SERVER_URL+'/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(t)});const j=await r.json();if(j.id)t.id=j.id;}catch{}}
  allTasks.unshift(t);applyFilter();toggleAddForm();
  ['fn','fd','fm'].forEach(id=>document.getElementById(id).value='');
}

function renderProject(){
  const c=document.getElementById('more-프로젝트');
  c.innerHTML=`
    <div class="srv-banner chk"><div class="srv-row"><span class="sdot spin"></span><span>서버 연결 확인 중...</span></div></div>
    <div class="proj-stats" id="projStats"></div>
    <div class="filter-row">
      <div class="fchip on" onclick="filterTask('전체',this)">전체</div>
      <div class="fchip" onclick="filterTask('할 일',this)">할 일</div>
      <div class="fchip" onclick="filterTask('진행 중',this)">진행 중</div>
      <div class="fchip" onclick="filterTask('완료',this)">완료</div>
    </div>
    <button class="add-task-btn" onclick="toggleAddForm()"><i class="ti ti-plus"></i>새 작업 추가</button>
    <div class="add-form" id="addForm">
      <div class="flbl">작업명 *</div>
      <input class="finp" id="fn" placeholder="작업명을 입력하세요">
      <div class="fgrid">
        <div><div class="flbl">우선순위</div><select class="fsel" id="fp"><option>긴급</option><option>높음</option><option selected>보통</option><option>낮음</option></select></div>
        <div><div class="flbl">카테고리</div><select class="fsel" id="fc"><option>백엔드</option><option>프론트엔드</option><option>디자인</option><option>데이터</option><option>배포</option><option>기획</option></select></div>
      </div>
      <div class="flbl">마감일</div>
      <input class="finp" id="fd" type="date">
      <div class="flbl">메모</div>
      <input class="finp" id="fm" placeholder="간단한 메모 (선택)">
      <div class="form-btns"><button class="f-no" onclick="toggleAddForm()">취소</button><button class="f-ok" onclick="submitTask()">Notion에 추가</button></div>
    </div>
    <div id="taskList"></div>
  `;
  checkServer();
}

// ── 실시간 시세 ──
function liveUpdate(){
  stocks.forEach(s=>{
    s.price=Math.max(1000,Math.round(s.price+(Math.random()-.498)*150));
    s.change=parseFloat((s.change+(Math.random()-.5)*.04).toFixed(2));
  });
  if(document.getElementById('panel-시세').classList.contains('on')){
    renderStocks();renderMarketBanner();
  }
}

// ── 초기화 ──
renderMarketBanner();
renderStocks();
renderNews();
setInterval(liveUpdate,4000);
</script>
